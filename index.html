<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/assets.css">
    <title>sounds of cologne</title>
</head>
<body>
    <div class="container">
        <!-- <h1>sounds of cologne</h1> -->
        <div class="mapContainer">
            <img src="assets/map2.png" alt="map of cologne" id="map">
            <img src="assets/mapheat.jpg" alt="map of cologne noise map" id="mapHeat">
            <div id="dotsContainer"></div>
        </div>

        <div class="soundGrid">
            <div class="slot">
                <!-- <div class="slotCircle"></div> -->
            </div>
            <div class="slot">
                <!-- <div class="slotCircle"></div> -->
            </div>
            <div class="slot">
                <!-- <div class="slotCircle"></div> -->
            </div>
            <div class="slot">
                <!-- <div class="slotCircle"></div> -->
            </div>
            <div class="slot">
                <!-- <div class="slotCircle"></div> -->
            </div>
            <div class="slot">
                <!-- <div class="slotCircle"></div> -->
            </div>
        </div>

        <div class="sliderContainer">
            <div class="sliderLabel">
                <p>volume</p> 
                 <input type="range" min="1" max="100" value="50" class="slider" id="volumeSlider">
            </div>
            <div class="sliderLabel">
                <p>pitch</p>
                <input type="range" min="1" max="100" value="50" class="slider" id="pitchSlider">    
            </div>    
            <div class="sliderLabel">
                <p>tempo</p>
                <input type="range" min="50" max="200" value="100" class="slider" id="tempoSlider">
            </div>
        </div>

        <div class="buttonContainer">
            <div class="heatMapButton">
                <button id="toggleHeatmapButton" type="button">toggle heatmap</button>
            </div>
            <div class="deleteClearButton">
                <button id="deleteButton" type="button">delete</button>
                <button id="clearAllButton" type="button">clear all</button>
            </div>

        </div>

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/tone@latest/build/Tone.min.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/draganddrop.js"></script>
</body>
</html>
